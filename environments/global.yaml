# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  # add package specs to the `specs` list
  specs:
  - group: compiler
    specs:
    - gcc@14

  - group: apps
    needs: [compiler]
    override:
      concretizer:
        unify: when_possible
      packages:
        all:
          require:
          - one_of:
            - gcc@14
    specs:
    - cuda@13.2
    - curl+libidn2
    - gmake
    - hdf5+cxx+fortran+hl
    - openmpi fabrics=ucx schedulers=slurm
    - py-keras backend=tensorflow
    - py-keras backend=torch
    - py-matplotlib+animation+movies+fonts+latex
    - py-tensorflow+mkl+mpi
    - py-torch~xnnpack+nccl cuda_arch=80
  view: false
