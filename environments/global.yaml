# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  # add package specs to the `specs` list
  specs:
  - group: compiler
    specs:
    - gcc@13 +nvptx ^cuda@12.9
    override:
      packages:
        c:
          prefer:
          - gcc@11
        cxx:
          prefer:
          - gcc@11
        fortran:
          prefer:
          - gcc@11

  - group: apps
    needs: [compiler]
    override:
      concretizer:
        unify: when_possible
      packages:
        c:
          prefer:
          - gcc@13+nvptx
        cxx:
          prefer:
          - gcc@13+nvptx
        fortran:
          prefer:
          - gcc@13+nvptx
    specs:
    - curl +libidn2
    - gmake
    - hdf5 +cxx+fortran+hl
    - openmpi fabrics=ucx schedulers=slurm
    - py-gpytorch
    - py-keras backend=torch ^py-torch@2
    - py-matplotlib@3.11 +animation+fonts+latex+movies
    - py-pytorch-lightning ^py-torch@2
    - py-torch@2 +nccl~xnnpack
    - py-torch-geometric ^py-torch@2
    - py-torch-scatter ^py-torch@2
    - py-torchaudio ^py-torch@2
    - py-torchmetrics +detection+image ^py-torch@2
    - py-torchvision +ffmpeg+nvjpeg+video_codec+webp ^py-torch@2

  view: false
